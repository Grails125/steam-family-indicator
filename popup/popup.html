<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>家庭库指示器</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 420px;
        font-family: -apple-system, "Segoe UI", sans-serif;
        background: #1b2838;
        color: #c7d5e0;
        padding: 16px;
        font-size: 12px;
      }
      h1 {
        font-size: 15px;
        color: #66c0f4;
        margin-bottom: 12px;
        padding-bottom: 8px;
        border-bottom: 1px solid #2a475e;
      }
      label {
        display: block;
        color: #8f98a0;
        margin-bottom: 4px;
        font-size: 11px;
      }
      input[type="text"] {
        width: 100%;
        padding: 8px 10px;
        background: #2a475e;
        border: 1px solid #4a5a70;
        border-radius: 3px;
        color: #c7d5e0;
        font-size: 12px;
        margin-bottom: 8px;
      }
      input::placeholder {
        color: #5a6a7a;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }
      button {
        padding: 8px 14px;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        font-size: 12px;
        color: #fff;
      }
      button:hover {
        opacity: 0.85;
      }
      button:disabled {
        background: #555 !important;
        cursor: not-allowed;
        opacity: 0.6;
      }
      .btn-save {
        background: #5a9fd4;
      }
      .btn-fetch {
        background: #4caf50;
        flex: 1;
      }
      .status {
        padding: 8px 12px;
        border-radius: 4px;
        margin-bottom: 10px;
        display: none;
        font-size: 12px;
        line-height: 1.6;
      }
      .status.show {
        display: block;
      }
      .status.ok {
        background: rgba(76, 175, 80, 0.15);
        color: #81c784;
        border: 1px solid rgba(76, 175, 80, 0.3);
      }
      .status.err {
        background: rgba(244, 67, 54, 0.15);
        color: #ef9a9a;
        border: 1px solid rgba(244, 67, 54, 0.3);
      }
      .status.warn {
        background: rgba(255, 152, 0, 0.15);
        color: #ffcc80;
        border: 1px solid rgba(255, 152, 0, 0.3);
      }
      .steam-id {
        color: #66c0f4;
        font-family: monospace;
      }
      .section-title {
        font-size: 12px;
        color: #8f98a0;
        margin: 12px 0 6px;
        display: flex;
        justify-content: space-between;
      }
      .count {
        color: #4caf50;
        font-weight: bold;
      }
      .game-list {
        max-height: 220px;
        overflow-y: auto;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 4px;
      }
      .game-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 10px;
        border-bottom: 1px solid #2a475e;
      }
      .game-item:last-child {
        border-bottom: none;
      }
      .game-name {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        margin-right: 8px;
      }
      .game-id {
        color: #666;
        font-size: 10px;
        flex-shrink: 0;
      }
      .empty {
        padding: 16px;
        text-align: center;
        color: #555;
      }
      .debug-toggle {
        cursor: pointer;
        color: #666;
        font-size: 10px;
        margin-top: 12px;
        user-select: none;
      }
      .debug-toggle:hover {
        color: #999;
      }
      .debug-box {
        display: none;
        margin-top: 6px;
        padding: 8px;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 4px;
        font-family: monospace;
        font-size: 10px;
        color: #888;
        max-height: 200px;
        overflow-y: auto;
        word-break: break-all;
        white-space: pre-wrap;
      }
      .debug-box.open {
        display: block;
      }
      .guide {
        background: rgba(102, 192, 244, 0.08);
        border: 1px solid rgba(102, 192, 244, 0.2);
        border-radius: 4px;
        padding: 10px;
        margin-bottom: 12px;
        line-height: 1.6;
      }
      .guide a {
        color: #66c0f4;
      }
      code {
        background: #2a475e;
        padding: 1px 4px;
        border-radius: 2px;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <h1>🎮 Steam 家庭库指示器</h1>

    <div class="guide">
      <b>由于 Steam API 限制，家庭库接口需要使用 Access Token (OAuth 令牌)：</b><br />
      1. 在浏览器登录 Steam 商店后，访问：<br />
      <a href="https://store.steampowered.com/pointssummary/ajaxgetasyncconfig" target="_blank"
        >store.steampowered.com/.../ajaxgetasyncconfig</a><br />
      2. 在页面显示的 JSON 中找到 <code>webapi_token</code> 的值 (通常以 v0 开头)。<br />
      3. 复制该值并粘贴到下方保存。
    </div>

    <label>Access Token (webapi_token)</label>
    <div class="row">
      <input
        type="text"
        id="apiKey"
        placeholder="粘贴你的 Access Token..."
        style="flex: 1"
      />
      <button class="btn-save" id="saveKey">保存</button>
    </div>

    <label>检测到的 Steam ID（自动检测，无需手动填写）</label>
    <div style="margin-bottom: 8px">
      <span class="steam-id" id="steamId"
        >未检测 — 请打开 store.steampowered.com</span
      >
    </div>

    <button class="btn-fetch" id="fetchBtn">📡 获取家庭库</button>

    <div class="status" id="status"></div>

    <div class="section-title">
      <span>家庭库游戏</span>
      <span class="count" id="count">0</span>
    </div>
    <div class="game-list" id="gameList">
      <div class="empty">尚未获取数据</div>
    </div>
    <div
      style="font-size: 10px; color: #555; margin-top: 4px"
      id="fetchTime"
    ></div>

    <div class="debug-toggle" id="debugToggle">▸ 显示调试信息</div>
    <div class="debug-box" id="debugBox"></div>

    <script src="popup.js"></script>
  </body>
</html>
